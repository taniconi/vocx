<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Vocabulary Quiz</title>
  <meta name="theme-color" content="#0a84ff">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      color-scheme: dark;
      --bg: #000000;
      --bg-elevated: #0c0c0e;
      --surface: #161618;
      --surface-strong: #222226;
      --surface-soft: #1c1c20;
      --line: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --text-muted: #b3b3b8;
      --primary: #0a84ff;
      --primary-strong: #409cff;
      --secondary: #5e5ce6;
      --success: #30d158;
      --error: #ff453a;
      --warning: #ffd60a;
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --header-bg: rgba(10, 10, 12, 0.88);
      --header-shadow: 0 18px 40px rgba(0, 0, 0, 0.36);
      --overlay-bg: rgba(0, 0, 0, 0.68);
      --overlay-panel-bg: rgba(18, 18, 20, 0.96);
      --overlay-shadow: 0 22px 48px rgba(0, 0, 0, 0.42);
      --ghost-fill: rgba(255, 255, 255, 0.06);
      --ghost-fill-strong: rgba(255, 255, 255, 0.1);
      --ghost-fill-soft: rgba(255, 255, 255, 0.045);
      --drawer-bg: rgba(255, 255, 255, 0.025);
      --danger-bg: rgba(255, 69, 58, 0.14);
      --danger-line: rgba(255, 69, 58, 0.32);
      --toggle-bg: rgba(255, 255, 255, 0.16);
      --stat-gauge-bg: rgba(255, 255, 255, 0.08);
      --stat-center-line: rgba(255, 255, 255, 0.18);
      --stat-rate-color: #ffffff;
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #ffffff;
      --bg-elevated: #f7f7f7;
      --surface: #ffffff;
      --surface-strong: #efeff4;
      --surface-soft: #f2f2f7;
      --line: rgba(60, 60, 67, 0.16);
      --text: #000000;
      --text-muted: #6e6e73;
      --primary: #007aff;
      --primary-strong: #005ecb;
      --secondary: #5856d6;
      --success: #34c759;
      --error: #ff3b30;
      --warning: #ffcc00;
      --header-bg: rgba(255, 255, 255, 0.86);
      --header-shadow: 0 18px 40px rgba(60, 60, 67, 0.12);
      --overlay-bg: rgba(0, 0, 0, 0.16);
      --overlay-panel-bg: rgba(255, 255, 255, 0.97);
      --overlay-shadow: 0 22px 48px rgba(60, 60, 67, 0.16);
      --ghost-fill: rgba(60, 60, 67, 0.06);
      --ghost-fill-strong: rgba(60, 60, 67, 0.1);
      --ghost-fill-soft: rgba(60, 60, 67, 0.045);
      --drawer-bg: rgba(60, 60, 67, 0.035);
      --danger-bg: rgba(255, 59, 48, 0.1);
      --danger-line: rgba(255, 59, 48, 0.18);
      --toggle-bg: rgba(120, 120, 128, 0.16);
      --stat-gauge-bg: rgba(60, 60, 67, 0.08);
      --stat-center-line: rgba(60, 60, 67, 0.18);
      --stat-rate-color: #000000;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Noto Sans JP", "Noto Sans", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: calc(32px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) calc(40px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left));
      overflow-x: hidden;
      transition: background 0.25s ease, color 0.25s ease;
    }

    html {
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    body {
      touch-action: manipulation;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    .background-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .background-grid {
      opacity: 0.08;
    }

    .app-shell {
      position: relative;
      z-index: 1;
      max-width: 920px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hidden {
      display: none;
    }

    .panel {
      position: relative;
      overflow: hidden;
      background: var(--bg-elevated);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
    }

    .gate-shell {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 8vh auto 0;
    }

    .gate-card {
      padding: 28px;
      display: grid;
      gap: 18px;
    }

    .gate-title {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      line-height: 1.1;
      letter-spacing: -0.04em;
    }

    .gate-text {
      margin: 0;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .gate-visual {
      width: 72px;
      height: 72px;
      color: var(--primary);
    }

    .gate-form {
      display: grid;
      gap: 12px;
    }

    .version-panel {
      display: grid;
      gap: 12px;
    }

    .version-heading {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
    }

    .version-grid {
      display: grid;
      gap: 10px;
      max-height: min(62dvh, 520px);
      overflow-y: auto;
      padding-right: 4px;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .version-option {
      display: grid;
      gap: 10px;
    }

    .version-button {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }

    .version-button:hover {
      transform: translateY(-1px);
      border-color: rgba(126, 196, 244, 0.4);
    }

    .version-button.active {
      background: rgba(126, 196, 244, 0.12);
      border-color: rgba(126, 196, 244, 0.42);
    }

    .version-button-title {
      display: block;
      font-size: 1rem;
      font-weight: 700;
    }

    .version-button-note {
      display: block;
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .all-range-panel {
      display: grid;
      gap: 12px;
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--drawer-bg);
    }

    .all-range-message {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .unit-range-list {
      display: grid;
      gap: 12px;
    }

    .unit-range-card {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--surface);
    }

    .unit-range-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .unit-range-title {
      margin: 0;
      font-weight: 700;
    }

    .unit-range-count {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .unit-range-control {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
    }

    .unit-range-slider {
      width: 100%;
      accent-color: var(--primary);
    }

    .unit-range-dial {
      width: 72px;
      min-height: 36px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--bg-elevated);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      text-align: center;
    }

    .unit-range-label {
      color: var(--text-muted);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .gate-error {
      min-height: 24px;
      margin: 0;
      color: var(--error);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .app-header {
      position: sticky;
      top: calc(18px + env(safe-area-inset-top));
      z-index: 6;
      display: grid;
      gap: 14px;
      padding: 18px 20px;
      background: var(--header-bg);
      backdrop-filter: blur(18px);
      box-shadow: var(--header-shadow);
    }

    .app-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .app-header-copy {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .app-header-kicker {
      margin: 0;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .app-header-title {
      margin: 0;
      font-size: clamp(1.45rem, 3.6vw, 2rem);
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .app-header-note {
      margin: 0;
      color: var(--text-muted);
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .app-header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-start;
      width: 100%;
    }

    .app-header-study {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 48px;
      padding: 0 16px;
      border-radius: 999px;
      background: var(--ghost-fill);
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 700;
    }

    .header-badge.button-like {
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    .header-badge.button-like:hover {
      transform: translateY(-1px);
      border-color: rgba(126, 196, 244, 0.24);
      background: var(--ghost-fill-strong);
    }

    .header-badge-label {
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .header-study-switcher {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: nowrap;
    }

    .header-study-button {
      min-height: 40px;
      min-width: 40px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--ghost-fill-soft);
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .header-study-button:hover {
      transform: translateY(-1px);
      border-color: rgba(126, 196, 244, 0.24);
    }

    .header-study-button.active {
      background: rgba(126, 196, 244, 0.12);
      border-color: rgba(126, 196, 244, 0.34);
      color: var(--primary);
    }

    .header-study-button svg {
      display: block;
      width: 22px;
      height: 22px;
      overflow: visible;
    }

    .header-settings-button {
      padding: 0 2px;
      background: transparent;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .header-settings-button:hover {
      transform: translateY(-1px);
      color: var(--text);
    }

    .header-settings-button.active {
      color: var(--primary);
    }

    .header-settings-button svg {
      display: block;
      width: 18px;
      height: 18px;
      overflow: visible;
    }

    .settings-drawer {
      display: grid;
      gap: 12px;
      padding-top: 6px;
      border-top: 1px solid var(--line);
    }

    .overlay-shell {
      position: fixed;
      inset: 0;
      z-index: 12;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--overlay-bg);
      backdrop-filter: blur(12px);
      overflow-y: auto;
    }

    .overlay-panel {
      width: min(560px, 100%);
      max-height: calc(100dvh - 48px);
      padding: 22px;
      border-radius: var(--radius-xl);
      background: var(--overlay-panel-bg);
      border: 1px solid var(--line);
      box-shadow: var(--overlay-shadow);
      display: grid;
      gap: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .overlay-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .overlay-copy {
      display: grid;
      gap: 6px;
    }

    .overlay-kicker {
      margin: 0;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .overlay-title {
      margin: 0;
      font-size: 1.25rem;
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .overlay-note {
      margin: 0;
      color: var(--text-muted);
      line-height: 1.6;
      font-size: 0.92rem;
    }

    .overlay-close {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--ghost-fill-soft);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .overlay-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: none;
      cursor: pointer;
      font: inherit;
    }

    button:disabled {
      cursor: default;
      opacity: 0.5;
    }

    .card {
      padding: 24px;
    }

    .quiz-card {
      display: grid;
      gap: 18px;
      text-align: left;
    }

    .quiz-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .quiz-chip-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .quiz-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--line);
      font-size: 0.92rem;
    }

    .quiz-chip strong {
      color: var(--text);
      font-weight: 700;
    }

    .quiz-chip.active-sheet {
      background: rgba(145, 167, 255, 0.12);
      color: var(--secondary);
      border-color: rgba(145, 167, 255, 0.24);
    }

    .quiz-chip.active-sheet strong {
      color: var(--text);
    }

    .progress-wrap {
      position: relative;
      width: min(280px, 100%);
      padding-top: 18px;
    }

    .progress {
      position: relative;
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: var(--surface);
      overflow: hidden;
    }

    .progress-bar {
      position: absolute;
      inset: 0 auto 0 0;
      border-radius: inherit;
      background: var(--success);
    }

    .progress-bonus {
      position: absolute;
      right: 0;
      top: 0;
      color: var(--success);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      opacity: 0;
      transform: translateY(0);
      pointer-events: none;
    }

    .progress-bonus.show {
      animation: progressBonusFloat 0.65s ease-out forwards;
    }

    .prompt-block {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    .prompt-label {
      margin: 0 0 10px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .prompt-text {
      margin: 0;
      font-size: clamp(1.05rem, 2vw, 1.28rem);
      line-height: 1.8;
      color: var(--text);
    }

    .prompt-text.prompt-text-emphasis {
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      line-height: 1.25;
      letter-spacing: -0.03em;
    }

    .masked-answer {
      font-weight: 700;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .masked-answer.revealed-incorrect {
      color: var(--error);
      letter-spacing: 0;
    }

    .answer-row {
      position: relative;
      display: flex;
      align-items: stretch;
    }

    input {
      flex: 1 1 260px;
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 18px;
      padding: 16px 64px 16px 18px;
      outline: none;
      font-size: 1rem;
    }

    input:focus {
      border-color: rgba(126, 196, 244, 0.52);
      background: var(--surface-strong);
    }

    .primary-button {
      padding: 16px 22px;
      border-radius: 18px;
      background: var(--primary);
      color: #0b2230;
      font-weight: 700;
    }

    .answer-submit {
      position: absolute;
      top: 50%;
      right: 8px;
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 14px;
      background: var(--primary);
      color: #0b2230;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transform: translateY(-50%);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .answer-submit:hover {
      transform: translateY(calc(-50% - 1px));
      background: var(--primary-strong);
    }

    .answer-submit svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    .choices-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .choice-button {
      padding: 18px;
      border-radius: 20px;
      text-align: left;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 600;
      min-height: 68px;
      line-height: 1.5;
    }

    .choice-button.correct {
      border-color: var(--success);
    }

    .choice-button.incorrect {
      border-color: var(--error);
      animation: choiceShake 0.28s ease-in-out 1;
    }

    @keyframes progressBonusFloat {
      0% {
        opacity: 0;
        transform: translateY(6px);
      }
      20% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(-10px);
      }
    }

    @keyframes choiceShake {
      0%, 100% {
        transform: translateX(0);
      }
      25% {
        transform: translateX(-3px);
      }
      50% {
        transform: translateX(3px);
      }
      75% {
        transform: translateX(-2px);
      }
    }

    .helper-note {
      color: var(--text-muted);
      font-size: 0.92rem;
      margin: 0;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .meta-card {
      padding: 16px 18px;
      border-radius: var(--radius-md);
      background: var(--surface);
      border: 1px solid var(--line);
    }

    .meta-label {
      margin: 0 0 6px;
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .meta-value {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.5;
      font-weight: 700;
    }

    .profile-shell {
      display: grid;
      gap: 18px;
    }

    .secondary-button {
      padding: 12px 16px;
      border-radius: 16px;
      background: var(--ghost-fill-soft);
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 700;
    }

    .settings-panel {
      display: grid;
      gap: 12px;
      padding: 18px;
      border-radius: var(--radius-lg);
      background: var(--drawer-bg);
      border: 1px solid var(--line);
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .settings-copy {
      min-width: 0;
    }

    .settings-title {
      margin: 0 0 4px;
      font-size: 0.98rem;
      font-weight: 700;
    }

    .settings-note {
      margin: 0;
      color: var(--text-muted);
      line-height: 1.6;
      font-size: 0.92rem;
    }

    .settings-action {
      min-width: 110px;
    }

    .settings-select {
      width: min(240px, 100%);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      font: inherit;
    }

    .toggle-switch {
      position: relative;
      width: 58px;
      height: 34px;
      border-radius: 999px;
      background: var(--toggle-bg);
      border: 1px solid var(--line);
      flex: 0 0 auto;
    }

    .toggle-switch.disabled {
      opacity: 0.45;
    }

    .toggle-switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 4px;
      width: 26px;

<main class="app-shell" id="appShell">
  <section class="app-header panel" id="appHeader"></section>
  <section class="card panel" id="quiz"></section>
</main>

<div id="overlayRoot"></div>

<script>
const SHEET_CONFIG = {
  sheetId: '18H5k3pF7ELIIcgnOBU-WCRdjQtzGgmKizcaWPcPDHlY',
  gid: '0'
};
const PROFILE_COOKIE = 'voc_profile';
const SHEET_COOKIE = 'voc_sheet_version';
const ALL_SHEETS_KEY = 'all-sheets';

const MODE_LABELS = {
  definition_to_word: 'Definition to Word',
  word_to_japanese: 'Word to Japanese',
  japanese_to_word: 'Japanese to Word',
  my_page: 'My Page'
};

const PROFILE_MODE_LABELS = {
  definition_to_word: 'Definition to Word',
  word_to_japanese: 'Word to Japanese',
  japanese_to_word: 'Japanese to Word'
};

const QUIZ_MODES = ['japanese_to_word', 'word_to_japanese', 'definition_to_word'];

let entries = [];
let mode = 'japanese_to_word';
let current = 0;
let order = [];
let profile = createDefaultProfile();
let questionSession = null;
let settingsOpen = false;
let versionOverlayOpen = false;
let overlaySheetKey = '';
let overlayLoading = false;
let sheetVersions = [];
let currentSheetKey = '';
let lastQuizMode = 'japanese_to_word';
let perfectProgressCount = 0;
let draftAllModeRanges = {};
let allModeRangeEntriesByKey = {};
let allModeRangeLoading = false;

const appShell = document.getElementById('appShell');
const appHeader = document.getElementById('appHeader');
const overlayRoot = document.getElementById('overlayRoot');
const systemThemeMedia = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;

function setupNoZoomGestures() {
  document.addEventListener('gesturestart', (event) => event.preventDefault(), { passive: false });
  document.addEventListener('gesturechange', (event) => event.preventDefault(), { passive: false });
  document.addEventListener('gestureend', (event) => event.preventDefault(), { passive: false });

  document.addEventListener('touchmove', (event) => {
    if (event.touches && event.touches.length > 1) {
      event.preventDefault();
    }
  }, { passive: false });

  let lastTouchEnd = 0;
  document.addEventListener('touchend', (event) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) {
      event.preventDefault();
    }
    lastTouchEnd = now;
  }, { passive: false });
}

function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch((error) => {
      console.warn('Service worker registration failed.', error);
    });
  });
}

function getSheetVersion(key = currentSheetKey) {
  return sheetVersions.find((version) => version.key === key) || sheetVersions[0] || null;
}

function getRealSheetVersions() {
  return sheetVersions.filter((version) => version.key !== ALL_SHEETS_KEY);
}

function getSheetConfigUrl() {
  return `https://docs.google.com/spreadsheets/d/${SHEET_CONFIG.sheetId}/gviz/tq?tqx=out:json&gid=${SHEET_CONFIG.gid}`;
}

function getSheetUrl(key = currentSheetKey) {
  const version = getSheetVersion(key);
  if (!version) {
    throw new Error('Sheet version is not configured.');
  }
  return `https://docs.google.com/spreadsheets/d/${version.sheetId}/gviz/tq?tqx=out:json&gid=${version.gid}`;
}

function parseGoogleVisualizationResponse(text) {
  const prefix = 'google.visualization.Query.setResponse(';
  const start = text.indexOf(prefix);
  const end = text.lastIndexOf(');');

  if (start === -1 || end === -1) {
    throw new Error('Unexpected Google Sheets response.');
  }

  return JSON.parse(text.slice(start + prefix.length, end));
}

function normalizeCell(cell) {
  if (!cell) return '';
  const value = cell.f ?? cell.v ?? '';
  return String(value).trim();
}

function normalizeEntry(row) {
  const cells = row.c ?? [];
  const word = normalizeCell(cells[0]);
  const jp = normalizeCell(cells[1]);
  const def = normalizeCell(cells[2]);
  const example = normalizeCell(cells[3]);

  if (!word || !jp || !def) {
    return null;
  }

  return { word, jp, def, example };
}

function slugifyVersionKey(text, fallbackIndex) {
  const slug = String(text)
    .trim()
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
  return slug || `sheet-${fallbackIndex + 1}`;
}

function normalizeSheetVersion(row, index) {
  const cells = row.c ?? [];
  const label = normalizeCell(cells[0]);
  const sheetId = normalizeCell(cells[1]);
  const gid = normalizeCell(cells[2]) || '0';

  if (!label || !sheetId) {
    return null;
  }

  return {
    key: slugifyVersionKey(label, index),
    label,
    note: '',
    sheetId,
    gid
  };
}

async function loadSheetVersions() {
  const response = await fetch(getSheetConfigUrl());

  if (!response.ok) {
    throw new Error(`Failed to load sheet config: ${response.status}`);
  }

  const text = await response.text();
  const payload = parseGoogleVisualizationResponse(text);
  const rows = payload.table?.rows ?? [];
  const nextVersions = rows
    .map(normalizeSheetVersion)
    .filter(Boolean);

  if (!nextVersions.length) {
    throw new Error('No valid sheet versions found in config sheet.');
  }

  sheetVersions = [
    {
      key: ALL_SHEETS_KEY,
      label: 'ALL',
      note: ''
    },
    ...nextVersions
  ];
}

async function loadSheetDataForKey(key = currentSheetKey) {
  if (key === ALL_SHEETS_KEY) {
    const selectedKeys = getEffectiveAllModeKeys();
    const versions = getRealSheetVersions().filter((version) => selectedKeys.includes(version.key));
    if (!versions.length) {
      throw new Error('No sheet versions available for combined mode.');
    }

    const payloads = await Promise.all(
      versions.map(async (version) => {
        const payload = await loadSheetDataForKey(version.key);
        const range = getAllModeRangeForKey(version.key, payload.entries.length);
        return {
          entries: payload.entries.slice(range.start - 1, range.end)
        };
      })
    );

    const nextEntries = payloads.flatMap((payload) => payload.entries);
    if (!nextEntries.length) {
      throw new Error('No valid vocabulary rows found across sheet versions.');
    }

    return {
      entries: nextEntries
    };
  }

  const response = await fetch(getSheetUrl(key));

  if (!response.ok) {
    throw new Error(`Failed to load sheet data: ${response.status}`);
  }

  const text = await response.text();
  const payload = parseGoogleVisualizationResponse(text);
  const rows = payload.table?.rows ?? [];

  if (!rows.length) {
    throw new Error('No rows found in sheet.');
  }

  const nextEntries = rows
    .map(normalizeEntry)
    .filter(Boolean);

  if (!nextEntries.length) {
    throw new Error('No valid vocabulary rows found in sheet.');
  }

  return {
    entries: nextEntries
  };
}

async function loadSheetData() {
  const payload = await loadSheetDataForKey();
  entries = payload.entries;
}

function applyLoadedSheetState(nextKey, payload) {
  currentSheetKey = nextKey;
  entries = payload.entries;
  current = 0;
  perfectProgressCount = 0;
  questionSession = null;
  order = [...entries.keys()];
  shuffle(order);
}

function createDefaultStats() {
  return { attempted: 0, correct: 0, timeMsTotal: 0, timeCount: 0 };
}

function createDefaultProfile() {
  return {
    theme: {
      followSystem: true,
      darkMode: true
    },
    revealFirstLetterHint: false,
    autoFocusDefinitionAnswer: false,
    allModeSettings: {
      selectAll: true,
      selectedKeys: [],
      ranges: {}
    },
    stats: {
      definition_to_word: createDefaultStats(),
      word_to_japanese: createDefaultStats(),
      japanese_to_word: createDefaultStats()
    }
  };
}

function setCookie(name, value, days = 365) {
  const expires = new Date(Date.now() + days * 24 * 60 * 60 * 1000).toUTCString();
  document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Lax`;
}

function getCookie(name) {
  const prefix = `${name}=`;
  const cookies = document.cookie ? document.cookie.split('; ') : [];
  for (const cookie of cookies) {
    if (cookie.startsWith(prefix)) {
      return decodeURIComponent(cookie.slice(prefix.length));
    }
  }
  return '';
}

function loadProfile() {
  const raw = getCookie(PROFILE_COOKIE);
  if (!raw) return createDefaultProfile();

  try {
    const parsed = JSON.parse(raw);
    return {
      theme: {
        followSystem: parsed.theme?.followSystem !== false,
        darkMode: parsed.theme?.darkMode !== false
      },
      revealFirstLetterHint: Boolean(parsed.revealFirstLetterHint),
      autoFocusDefinitionAnswer: Boolean(parsed.autoFocusDefinitionAnswer),
      allModeSettings: {
        selectAll: parsed.allModeSettings?.selectAll !== false,
        selectedKeys: Array.isArray(parsed.allModeSettings?.selectedKeys)
          ? parsed.allModeSettings.selectedKeys.filter((key) => typeof key === 'string')
          : [],
        ranges: parsed.allModeSettings?.ranges && typeof parsed.allModeSettings.ranges === 'object'
          ? parsed.allModeSettings.ranges
          : {}
      },
      stats: {
        definition_to_word: {
          ...createDefaultStats(),
          ...(parsed.stats?.definition_to_word || {})
        },
        word_to_japanese: {
          ...createDefaultStats(),
          ...(parsed.stats?.word_to_japanese || {})
        },
        japanese_to_word: {
          ...createDefaultStats(),
          ...(parsed.stats?.japanese_to_word || {})
        }
      }
    };
  } catch (error) {
    console.warn('Failed to parse profile cookie.', error);
    return createDefaultProfile();
  }
}

function saveProfile() {
  setCookie(PROFILE_COOKIE, JSON.stringify(profile));
}

function isSystemDarkMode() {
  return Boolean(systemThemeMedia?.matches);
}

function getResolvedTheme() {
  const theme = profile.theme || createDefaultProfile().theme;
  const useDarkMode = theme.followSystem ? isSystemDarkMode() : theme.darkMode !== false;
  return useDarkMode ? 'dark' : 'light';
}

function applyTheme() {
  const resolvedTheme = getResolvedTheme();
  document.documentElement.dataset.theme = resolvedTheme;
  document.documentElement.style.colorScheme = resolvedTheme;
}

function getAllModeSettings() {
  const stored = profile.allModeSettings || createDefaultProfile().allModeSettings;
  const validKeys = new Set(getRealSheetVersions().map((version) => version.key));
  const selectedKeys = (stored.selectedKeys || []).filter((key) => validKeys.has(key));
  const ranges = {};

  if (stored.ranges && typeof stored.ranges === 'object') {
    Object.entries(stored.ranges).forEach(([key, range]) => {
      if (validKeys.has(key) && range && typeof range === 'object') {
        ranges[key] = {
          start: Number.parseInt(range.start, 10),
          end: Number.parseInt(range.end, 10)
        };
      }
    });
  }

  return {
    selectAll: stored.selectAll !== false,
    selectedKeys,
    ranges
  };
}

function getEffectiveAllModeKeys() {
  const versions = getRealSheetVersions();
  return versions.map((version) => version.key);
}

function normalizeAllModeRange(range, count) {
  const max = Math.max(1, count);
  const rawStart = Number.parseInt(range?.start, 10);
  const rawEnd = Number.parseInt(range?.end, 10);
  const start = Math.min(Math.max(Number.isFinite(rawStart) ? rawStart : 1, 1), max);
  const end = Math.min(Math.max(Number.isFinite(rawEnd) ? rawEnd : max, 1), max);

  return start <= end
    ? { start, end }
    : { start: end, end: start };
}

function getAllModeRangeForKey(key, count) {
  const settings = getAllModeSettings();
  return normalizeAllModeRange(settings.ranges[key], count);
}

function getDraftAllModeRangeForKey(key, count) {
  return normalizeAllModeRange(draftAllModeRanges[key], count);
}

function saveSelectedSheet(key) {
  setCookie(SHEET_COOKIE, key, 365);
}

function loadSelectedSheet() {
  const saved = getCookie(SHEET_COOKIE);
  if (!saved) {
    return ALL_SHEETS_KEY;
  }
  return getSheetVersion(saved)?.key || ALL_SHEETS_KEY;
}

function getCurrentVersionLabel() {
  return getSheetVersion()?.label || 'Not set';
}

function renderVersionSelector() {
  const container = document.getElementById('versionSelector');
  if (!container) return;

  container.innerHTML = sheetVersions.map((version) => `
    <button
      class="version-button ${version.key === currentSheetKey ? 'active' : ''}"
      type="button"
      data-sheet-key="${version.key}"
    >
      <span class="version-button-title">${escapeHtml(version.label)}</span>
      <span class="version-button-note">${escapeHtml(version.note)}</span>
    </button>
  `).join('');

  container.querySelectorAll('.version-button').forEach((button) => {
    button.addEventListener('click', () => {
      switchSheetVersion(button.dataset.sheetKey || sheetVersions[0]?.key || '');
    });
  });
}

function ensureQuestionSession() {
  if (!questionSession) {
    questionSession = {
      mode,
      answered: false
    };
  }
}

function recordQuestionOutcome(isCorrectOnFirstTry) {
  if (!QUIZ_MODES.includes(mode)) return;
  ensureQuestionSession();
  if (questionSession.answered) return;

  const stats = profile.stats[mode];
  stats.attempted += 1;
  if (isCorrectOnFirstTry) {
    stats.correct += 1;
  }

  const elapsedMs = typeof questionSession.startedAt === 'number'
    ? Math.max(0, Math.round(performance.now() - questionSession.startedAt))
    : null;
  if (elapsedMs !== null) {
    stats.timeMsTotal = (stats.timeMsTotal || 0) + elapsedMs;
    stats.timeCount = (stats.timeCount || 0) + 1;
  }

  questionSession.answered = true;
  saveProfile();
}

function getAccuracy(stats) {
  if (!stats.attempted) return '0%';
  return `${Math.round((stats.correct / stats.attempted) * 100)}%`;
}

function getGaugeWidths(stats) {
  if (!stats.attempted) {
    return { correct: 0, incorrect: 0 };
  }

  const correct = (stats.correct / stats.attempted) * 100;
  const incorrect = Math.max(0, 100 - correct);
  return { correct, incorrect };
}

function formatAverageTime(stats) {
  const total = Number(stats.timeMsTotal || 0);
  const count = Number(stats.timeCount || 0);
  if (!count || !Number.isFinite(total)) return '-';
  const seconds = total / count / 1000;
  if (!Number.isFinite(seconds)) return '-';
  return `${seconds.toFixed(1)}s`;
}

function getTotalStats() {
  return QUIZ_MODES.reduce((acc, key) => {
    acc.attempted += profile.stats[key].attempted;
    acc.correct += profile.stats[key].correct;
    acc.timeMsTotal += profile.stats[key].timeMsTotal || 0;
    acc.timeCount += profile.stats[key].timeCount || 0;
    return acc;
  }, createDefaultStats());
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function escapeRegExp(text) {
  return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function getMaskCandidates(word) {
  const lower = word.toLowerCase();
  const forms = new Set([lower]);

  forms.add(`${lower}s`);
  forms.add(`${lower}es`);
  forms.add(`${lower}ed`);
  forms.add(`${lower}ing`);

  if (lower.endsWith('e')) {
    forms.add(`${lower}d`);
    forms.add(`${lower.slice(0, -1)}ing`);
  }

  if (lower.endsWith('y') && lower.length > 1) {
    const stem = lower.slice(0, -1);
    forms.add(`${stem}ies`);
    forms.add(`${stem}ied`);
    forms.add(`${stem}ying`);
  }

  if (/[sxz]$/.test(lower) || /(sh|ch)$/.test(lower)) {
    forms.add(`${lower}es`);
  }

  return [...forms].sort((a, b) => b.length - a.length);
}

function maskWord(text, word) {
  if (!text || !word) return text;
  const variants = getMaskCandidates(word);

  return escapeHtml(text).replace(/[A-Za-z]+/g, (token) => {
    const matched = variants.find((variant) => token.toLowerCase() === variant);
    const shouldRevealFirstLetter = Boolean(profile?.revealFirstLetterHint);
    const maskedText = shouldRevealFirstLetter
      ? `${token.slice(0, 1)}${'_'.repeat(Math.max(0, token.length - 1))}`
      : '_'.repeat(token.length);
    return matched
      ? `<span class="masked-answer" data-answer="${escapeHtml(token)}">${maskedText}</span>`
      : token;
  });
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function getCurrentEntry() {
  return entries[order[current]];
}

function getProgressWidth() {
  if (!entries.length) return '0%';
  return `${(perfectProgressCount / entries.length) * 100}%`;
}

function renderMetaCards(items) {
  return `
    <div class="meta-grid">
      ${items.map(item => `
        <div class="meta-card">
          <p class="meta-label">${item.label}</p>
          <p class="meta-value">${item.value}</p>
        </div>
      `).join('')}

async function ensureAllModeRangeEntries() {
  const missingVersions = getRealSheetVersions().filter((version) => !allModeRangeEntriesByKey[version.key]);
  if (!missingVersions.length || allModeRangeLoading) return;

  allModeRangeLoading = true;
  renderVersionOverlay();

  const results = await Promise.allSettled(
    missingVersions.map(async (version) => ({
      key: version.key,
      payload: await loadSheetDataForKey(version.key)
    }))
  );

  results.forEach((result, index) => {
    const version = missingVersions[index];
    if (result.status === 'fulfilled') {
      allModeRangeEntriesByKey[version.key] = result.value.payload;
      return;
    }

    allModeRangeEntriesByKey[version.key] = {
      entries: [],
      error: result.reason
    };
  });

  allModeRangeLoading = false;
  renderVersionOverlay();
}

function updateDraftAllModeRange(key, edge, value) {
  const count = allModeRangeEntriesByKey[key]?.entries?.length || 0;
  if (!key || !count || !['start', 'end'].includes(edge)) return;

  const currentRange = getDraftAllModeRangeForKey(key, count);
  const nextValue = Math.min(Math.max(Number.parseInt(value, 10) || 1, 1), count);
  const nextRange = { ...currentRange, [edge]: nextValue };

  if (edge === 'start' && nextRange.start > nextRange.end) {
    nextRange.end = nextRange.start;
  }
  if (edge === 'end' && nextRange.end < nextRange.start) {
    nextRange.start = nextRange.end;
  }

  draftAllModeRanges = {
    ...draftAllModeRanges,
    [key]: nextRange
  };

  overlayRoot.querySelectorAll('[data-all-range-key]').forEach((input) => {
    if (input.dataset.allRangeKey !== key) return;

    if (input.dataset.allRangeEdge === 'start') {
      input.value = nextRange.start;
    }
    if (input.dataset.allRangeEdge === 'end') {
      input.value = nextRange.end;
    }
  });

  const countLabel = [...overlayRoot.querySelectorAll('[data-all-range-count-key]')]
    .find((label) => label.dataset.allRangeCountKey === key);
  if (countLabel) {
    countLabel.textContent = `${nextRange.start}-${nextRange.end} / ${count}`;
  }
}

async function applyAllModeRangeSelection() {
  profile.allModeSettings = {
    selectAll: true,
    selectedKeys: [],
    ranges: { ...draftAllModeRanges }
  };
  saveProfile();
  overlayLoading = true;
  renderHeader();

  try {
    const payload = await loadSheetDataForKey(ALL_SHEETS_KEY);
    applyLoadedSheetState(ALL_SHEETS_KEY, payload);
    saveSelectedSheet(currentSheetKey);
    renderVersionSelector();
    renderHeader();
    renderCurrentQuestion();
    closeVersionOverlay();
    return;
  } catch (error) {
    entries = [];
    console.warn('Failed to reload ALL mode data after updating range selection.', error);
  } finally {
    overlayLoading = false;
  }

  renderCurrentQuestion();
  renderVersionOverlay();
}

async function selectOverlaySheetVersion(nextKey) {
  const nextVersion = getSheetVersion(nextKey);
  if (!nextVersion || overlayLoading) return;

  overlaySheetKey = nextVersion.key;

  if (nextVersion.key === ALL_SHEETS_KEY) {
    draftAllModeRanges = { ...getAllModeSettings().ranges };
    renderVersionOverlay();
    ensureAllModeRangeEntries();
    return;
  }

  if (nextVersion.key === currentSheetKey) {
    renderVersionOverlay();
    return;
  }

  overlayLoading = true;
  renderVersionOverlay();

  try {
    const payload = await loadSheetDataForKey(nextVersion.key);
    applyLoadedSheetState(nextVersion.key, payload);
    saveSelectedSheet(currentSheetKey);
    renderVersionSelector();
    renderHeader();
    renderCurrentQuestion();
    closeVersionOverlay();
    return;
  } catch (error) {
    console.warn('Failed to load question data for overlay version switch.', error);
  } finally {
    overlayLoading = false;
    renderVersionOverlay();
  }
}

  }

  if (!bonus) return;
  bonus.classList.remove("show");
  void bonus.offsetWidth;
  bonus.classList.add("show");
}

function handleCorrect(isPerfect = false) {
  if (isPerfect) {
    perfectProgressCount += 1;
    showProgressBonus();
  }
  setTimeout(() => nextQuestion(), 500);
}

function nextQuestion() {
  current += 1;
  questionSession = null;

  if (current >= order.length) {
    order = [...entries.keys()];
    shuffle(order);
    current = 0;
    perfectProgressCount = 0;
  }

  renderCurrentQuestion();
}

function getChoices(correct, pool) {
  const uniquePool = pool.filter(Boolean);
  const set = new Set([correct]);

  while (set.size < Math.min(4, uniquePool.length)) {
    set.add(uniquePool[Math.floor(Math.random() * uniquePool.length)]);
  }

  const choices = [...set];
  shuffle(choices);
  return choices;
}

}

    [],
    { hideLabel: true }
  );

  const answerInput = document.getElementById("answer");
  answerInput?.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      checkDefinitionToWord();
    }
  });

  if (profile.autoFocusDefinitionAnswer) {
    requestAnimationFrame(() => {
      const input = document.getElementById("answer");
      if (!input) return;
      input.focus();
      input.select();
    });
  }
}

function revealMaskedAnswers() {
  document.querySelectorAll('.masked-answer').forEach((element) => {
    const answer = element.dataset.answer;
    if (!answer) return;
    element.textContent = answer;
    element.classList.add('revealed-incorrect');
  });
}

function checkDefinitionToWord() {
  ensureQuestionSession();
  const rawValue = document.getElementById("answer").value;
  if (rawValue === ' ' || rawValue === '　') {
    recordQuestionOutcome(false);
    nextQuestion();
    return;
  }

  const user = rawValue.trim().toLowerCase();
  const correct = getCurrentEntry().word.toLowerCase();

  if (user === correct) {
    const isPerfect = !questionSession.answered;
    recordQuestionOutcome(isPerfect);
    handleCorrect(isPerfect);
    return;
  }

  recordQuestionOutcome(false);
  revealMaskedAnswers();
}

function showWordToJapanese() {
  const entry = getCurrentEntry();
  const choices = getChoices(entry.jp, entries.map(item => item.jp));

  renderCard(
    'Word',
    entry.word,
    '',
    renderChoiceButtons(choices),
    [],
    { hideLabel: true, emphasizePrompt: true }
  );

  bindChoiceButtons();
}

function showJapaneseToWord() {
  const entry = getCurrentEntry();
  const choices = getChoices(entry.word, entries.map(item => item.word));

  renderCard(
    'Japanese',
    entry.jp,
    '',
    renderChoiceButtons(choices),
    [],
    { hideLabel: true, emphasizePrompt: true }
  );

  bindChoiceButtons();
}

function checkChoice(button, selected) {
  ensureQuestionSession();
  const entry = getCurrentEntry();
  const correct = mode === 'word_to_japanese' ? entry.jp : entry.word;

  if (selected === correct) {
    const isPerfect = !questionSession.answered;
    recordQuestionOutcome(isPerfect);
    markChoice(button, true);
    handleCorrect(isPerfect);
  } else {
    recordQuestionOutcome(false);
    markChoice(button, false);
  }
}

function renderCurrentQuestion() {
  if (mode === 'my_page') {
    renderProfilePage();
    return;
  }

  if (!entries.length) {
    renderLoadError('Google Sheets vocabulary data could not be loaded.');
    return;
  }

  if (isStudyMode(mode)) {
    if (!questionSession || questionSession.mode !== mode) {
      questionSession = {
        mode,
        answered: false,
        startedAt: performance.now()
      };
    } else if (typeof questionSession.startedAt !== 'number') {
      questionSession.startedAt = performance.now();
    }
  }

  if (mode === 'definition_to_word') {
    showDefinitionToWord();
    return;
  }

  if (mode === 'word_to_japanese') {
    showWordToJapanese();
    return;
  }

  showJapaneseToWord();
}

function setMode(nextMode) {
  if (!entries.length && nextMode !== 'my_page') {
    renderLoadError('Google Sheets vocabulary data could not be loaded.');
    return;
  }

  mode = nextMode;
  if (isStudyMode(nextMode)) {
    lastQuizMode = nextMode;
  }
  questionSession = null;
  if (nextMode !== 'my_page') {
    settingsOpen = false;
  }
  current = 0;
  perfectProgressCount = 0;
  if (QUIZ_MODES.includes(nextMode)) {
    order = [...entries.keys()];
    shuffle(order);
  }
  renderHeader();
  renderCurrentQuestion();
}

function unlockApp() {
  setMode(mode);
}

function handleSystemThemeChange() {
  if (!profile.theme?.followSystem) return;
  applyTheme();
  renderHeader();
}

// ===== Simple test =====
(function test() {
  const sample = getChoices('a', ['a', 'b', 'c', 'd', 'e']);
  console.assert(sample.includes('a'), 'choices must include correct');
})();

async function initializeApp() {
  setupNoZoomGestures();
  registerServiceWorker();

  profile = loadProfile();
  settingsOpen = false;
  applyTheme();

  if (systemThemeMedia) {
    if (typeof systemThemeMedia.addEventListener === 'function') {
      systemThemeMedia.addEventListener('change', handleSystemThemeChange);
    } else if (typeof systemThemeMedia.addListener === 'function') {
      systemThemeMedia.addListener(handleSystemThemeChange);
    }
  }

  try {
    await loadSheetVersions();
  } catch (error) {
    console.warn('Failed to load sheet version config.', error);
    renderLoadError('Could not load the sheet list from the admin spreadsheet.');
    return;
  }

  currentSheetKey = loadSelectedSheet();
  renderVersionSelector();
  try {
    await loadSheetData();
    console.info(`Loaded ${entries.length} rows from Google Sheets.`);
  } catch (error) {
    entries = [];
    console.warn('Failed to load question data.', error);
  }
  unlockApp();
}

initializeApp();
</script>
